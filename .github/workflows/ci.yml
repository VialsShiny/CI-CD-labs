name: Continuous Integration

on:
    push:

jobs:
    quality-frontend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: npm

            - name: Install dependencies
              run: make install-frontend

            - name: Run linter
              run: make lint-frontend

    quality-backend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: npm

            - name: Install dependencies
              run: make install-backend

            - name: Run linter
              run: make lint-backend

    test-backend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: npm

            - name: Install dependencies
              run: make install-backend

            - name: Run tests
              run: make jest-backend

    test-frontend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: npm

            - name: Install dependencies
              run: make install-frontend

            - name: Run tests
              run: make jest-frontend
